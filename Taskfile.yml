version: '3'

set: [ pipefail ]

tasks:
    default:
        desc: Show available tasks
        cmds:
            - task --list

    # ─── Top-level orchestration ───

    build:
        desc: Build both UI and server components
        cmds:
            -   task: build-ui
            -   task: build-srv

    serve:
        desc: Start UI and server concurrently
        deps:
            - serve-ui
            - serve-srv

    test:
        desc: Run all tests
        cmds:
            -   task: test-srv
            -   task: test-ui

    install:
        desc: Install
        cmds:
            - echo "install"

    release:
        desc: Build, test, and install
        cmds:
            -   task: build
            -   task: test
            -   task: install

    dev-external-start:
        desc: Start the external user application (dev mode)
        dir: ./external-user-app
        cmds:
            - node server.js

    # ─── Backend (srv) ───

    serve-srv:
        desc: Start backend server in development/debug mode
        dir: ./srv
        cmds:
            - npm run start:debug

    build-srv:
        desc: Install dependencies and build the backend server
        dir: ./srv
        cmds:
            - npm i
            - npm run build

    release-srv:
        desc: Run backend release routine (build + package + test)
        dir: ./srv
        cmds:
            - npm run release

    test-srv:
        desc: Run backend tests
        dir: ./srv
        cmds:
            - npm run test

    prod-start-srv:
        desc: Start backend server in production mode
        dir: ./srv
        cmds:
            - npm run start:prod

    # ─── UI ───

    serve-ui:
        desc: Start frontend dev server with live-reload
        dir: ./ui
        cmds:
            - npm run UI:SERVE:WATCH

    build-ui:
        desc: Install dependencies and build the production UI
        dir: ./ui
        cmds:
            - npm i
            - npm run build

    test-ui:
        desc: Run UI tests and e2e tests
        dir: ./ui
        cmds:
            - npm test
            - npm run e2e:test

    "cypress:spec":
        desc: "Run a single Cypress spec file (usage: task cypress:spec -- cypress/e2e/admin-keys.cy.ts)"
        dir: ./ui
        cmds:
            - npm run e2e:spec --spec={{.CLI_ARGS}}

    kill-ports:
        desc: Kill processes listening on ports 9001 and 4200
        cmds:
            -   cmd: powershell -NoProfile -ExecutionPolicy Bypass -File ./scripts/kill-ports.ps1
                platforms: [ windows ]
                ignore_error: true
            -   cmd: kill -9 $(lsof -t -i:9001) 2>/dev/null || true
                platforms: [ linux, darwin ]
                ignore_error: true
            -   cmd: kill -9 $(lsof -t -i:4200) 2>/dev/null || true
                platforms: [ linux, darwin ]
                ignore_error: true

    # ─── Docker ───

    docker-publish:
        desc: Build and publish standalone Docker image to Docker Hub
        cmds:
            - echo "🔨 Building standalone Docker image..."
            - docker build -f standalone.dockerfile -t sd25/auth-server:latest .
            - echo "🚀 Pushing sd25/auth-server:latest"
            - docker push sd25/auth-server:latest
